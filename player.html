<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no",shrink-to-fit=no">
    <title>Tambola Player</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        /* 1. GLOBAL RESET & DARK BACKGROUND */
        * { box-sizing: border-box; }
        html, body {
			background-color: #000000 !important; /* Pure black */
			margin: 0;
			padding: 15px; /* This creates the black border around the card on mobile */
			width: 100%;
			height: 100%; /* This prevents mobile browsers from showing white when scrolling past edges */
			overflow-x: hidden; 
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			display: flex;
			justify-content: center;
			align-items: flex-start; /* Keeps the card at the top */
			min-height: 100vh;
    		box-sizing: border-box;
		}
		
		/* 2. THE MAIN "TABLE" CONTAINER (The Game Card) */
        .app-container {
            background: #ffffff;
            width: 100%;
            max-width: 450px; /* Limits width on desktop */
            min-height: auto; /* Full height on mobile */
            padding: 25px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            text-align: center;
			border-radius: 15px; /* Gives rounded corners so the black shows at the edges */
    		margin-bottom: 20px;
        }

		/* Desktop Polish: centered card with black border around it */
        @media (min-width: 500px) {
            .app-container {
                min-height: auto;
				margin-top: 50px;
				margin-bottom: 50px;
				border-radius: 20px;
				border: 1px solid #333; /* Soft border against the black */
            }
        }

        /* 3. SETUP SCREEN STYLES */
        #setup h2 { color: #333; margin-bottom: 20px; }
        .input-field {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
        }

        /* 4. COLOR PICKER CIRCLES */
        .color-group { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .color-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 4px solid #eee;
            cursor: pointer;
            transition: all 0.2s;
        }
        .color-btn.active { border-color: #333; transform: scale(1.1); }

        /* 5. TICKET & GRID STYLES */
        .ticket-wrapper {
            background: #eee; /* Default */
            padding: 10px;
            border-radius: 10px;
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 4px;
        }
        .cell {
            background: #fff;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #ccc;
        }
        .cell.marked { background: #27ae60 !important; color: white; }
        .cell.empty { background: rgba(0,0,0,0.05); border: none; }

        /* 6. BUTTONS */
        .primary-btn {
            width: 100%;
            padding: 15px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .claim-btn { background: #f1c40f; color: #333; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- SETUP VIEW -->
    <div id="setup">
        <h2>Enter Player Name</h2>
        <input type="text" id="name" class="input-field" placeholder="Type your name...">
        
        <p>Pick Ticket Color:</p>
        <div class="color-group">
            <button class="color-btn" onclick="setChoice('#add8e6', this)" style="background:#add8e6;"></button>
            <button class="color-btn" onclick="setChoice('#90ee90', this)" style="background:#90ee90;"></button>
            <button class="color-btn" onclick="setChoice('#d3d3d3', this)" style="background:#d3d3d3;"></button>
        </div>

        <button class="primary-btn" onclick="joinGame()">JOIN ROOM</button>
    </div>

    <!-- GAME VIEW -->
    <div id="game" style="display:none;">
        <h3 id="welcome"></h3>
        <div style="background:#f0f0f0; padding:15px; border-radius:10px;">
            <small>CURRENT NUMBER</small>
            <h1 id="call" style="font-size:3rem; margin:0;">--</h1>
        </div>

        <div id="ticket" class="ticket-wrapper"></div>

        <button id="claim-btn" class="primary-btn claim-btn" onclick="claimPrize()">📢 CLAIM PRIZE!</button>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyAk8h-RIkYCMzqVlUMloLNz7GrSRPu2rGw",
		authDomain: "tambola-52363.firebaseapp.com",
		databaseURL: "https://tambola-52363-default-rtdb.europe-west1.firebasedatabase.app",
		projectId: "tambola-52363",
		storageBucket: "tambola-52363.firebasestorage.app",
		messagingSenderId: "36956217153",
		appId: "1:36956217153:web:c7539cb599f01d88770bc0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const gameRef = db.ref('games/party1'); // Make sure this matches your Host page

    let ticketColor = '#eee';
    let lastNum = 0;

    // --- SELECTION LOGIC ---
    function setChoice(color, el) {
        ticketColor = color;
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    // --- JOIN LOGIC ---
    async function joinGame() {
        const name = document.getElementById('name').value.trim();
        if(!name) return alert("Enter name!");

        // Duplicate Check
        const snap = await gameRef.child('players').once('value');
        const players = snap.val() || {};
        if(Object.values(players).some(p => p.name.toLowerCase() === name.toLowerCase())) {
            return alert("Name taken!");
        }

        // Save Player
        await gameRef.child('players').push({ name: name });

        // Switch UI
        document.getElementById('setup').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        document.getElementById('welcome').innerText = "Player: " + name;

        generateTicket();
    }

    // --- TICKET GENERATION ---
    function generateTicket() {
        const ticketDiv = document.getElementById('ticket');
        ticketDiv.style.backgroundColor = ticketColor;
        
        // Simple logic for testing: 15 random numbers
        let nums = [];
        while(nums.length < 15) {
            let r = Math.floor(Math.random() * 90) + 1;
            if(!nums.includes(r)) nums.push(r);
        }
        nums.sort((a,b) => a-b);

        // Fill 27 slots (3 rows of 9)
        for(let i=0; i<27; i++) {
            let cell = document.createElement('div');
            cell.className = 'cell';
            if(i % 2 === 0 && nums.length > 0) {
                let n = nums.shift();
                cell.innerText = n;
                cell.onclick = () => cell.classList.toggle('marked');
            } else {
                cell.className += ' empty';
            }
            ticketDiv.appendChild(cell);
        }
    }

    // --- LIVE SYNC ---
    gameRef.on('value', snap => {
        const data = snap.val() || {};
        const num = data.lastCalled || "--";
        document.getElementById('call').innerText = num;
        
        // Show claim button if game started
        if(num !== "--") document.getElementById('claim-btn').style.display = 'block';
    });

    function claimPrize() {
        const name = document.getElementById('name').value;
        gameRef.child('claims').push({ name: name, time: new Date().toLocaleTimeString() });
        alert("Claim sent!");
    }
</script>
</body>
</html>
