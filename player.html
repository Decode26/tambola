<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no",shrink-to-fit=no">
    <title>Tambola (Housie) Player</title>
    <link rel="icon" type="image/png" href="favicon.png">
	
	<!-- Apple Touch Icon for Mobile Home Screens -->
    <link rel="apple-touch-icon" href="favicon.png">
    
    <!-- For SEO - This will show in Google link-->
    <meta name="description" content="A real-time multiplayer Tambola (Housie) game for family game night.">

    <!-- Mobile App Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

	<!-- This changes the color of the Android task switcher and address bar -->
	<meta name="theme-color" content="#000000">

    <!-- Viewport tells the mobile Don't treat this like a giant desktop website-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        /* 1. GLOBAL RESET & DARK BACKGROUND */
        * { box-sizing: border-box; }
        html, body {
			background-color: #000000 !important; /* Pure black */
			margin: 0;
			padding: 15px; /* This creates the black border around the card on mobile */
			width: 100%;
			height: 100%; /* This prevents mobile browsers from showing white when scrolling past edges */
			overflow-x: hidden; 
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			display: flex;
			justify-content: center;
			align-items: flex-start; /* Keeps the card at the top */
			min-height: 100vh;
    		box-sizing: border-box;
		}

		
		/* 2. THE MAIN "TABLE" CONTAINER (The Game Card) */
        .app-container {
            background: #ffffff;
            width: 100%;
            max-width: 450px; /* Limits width on desktop */
            min-height: auto; /* Full height on mobile */
            padding: 25px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            text-align: center;
			border-radius: 15px; /* Gives rounded corners so the black shows at the edges */
    		margin-bottom: 15px;
        }

		/* Desktop Polish: centered card with black border around it */
        @media (min-width: 500px) {
            .app-container {
                min-height: auto;
				margin-top: 50px;
				margin-bottom: 50px;
				border-radius: 20px;
				border: 1px solid #333; /* Soft border against the black */
            }
        }

        /* 3. SETUP SCREEN STYLES */
        #setup h2 { color: #333; margin-bottom: 20px; }
        .input-field {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
        }

        /* 4. COLOR PICKER CIRCLES */
        .color-group { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .color-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 4px solid #eee;
            cursor: pointer;
            transition: all 0.2s;
        }
        .color-btn.active { border-color: #333; transform: scale(1.1); }

        /* 5. TICKET & GRID STYLES */
        .ticket-wrapper {
            background: #eee; /* Default */
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 4px;
            margin-bottom: 15px;
        }
        .cell {
            background: #fff;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #ccc;
        }
        .cell.marked {
            background: #e74c3c !important;
            color: white;
            border-radius: 50%; /* Makes it a circle */
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        .cell.empty { background: rgba(0,0,0,0.05); border: none; }

        /* 6. BUTTONS */
        .primary-btn {
            width: 100%;
            padding: 15px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .claim-btn { background: #f1c40f; color: #333; margin-top: 20px; display: none; }

        .history-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin: 15px auto;
         }

        .hist-slot {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 1.5px solid #ddd;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Added a little "bounce" */
        }

        .hist-slot.primary {
            width: 50px;
            height: 50px;
            font-size: 1.2rem;
            background-color: #b0d1b9;
            color: white;
            border-color: #779680;
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3);
            z-index: 2;
        }

        .hist-slot.secondary {
            background-color: #f8f9fa;
            color: #95a5a6;
            font-size: 0.85rem;
            opacity: 0.8;
        }

    </style>
</head>
<body>

<div class="app-container">
    <!-- SETUP VIEW -->
    <div id="setup">
        <h2>Enter Player Name</h2>
        <input type="text" id="name" class="input-field" placeholder="Type your name...">
        
        <p>Pick Your Lucky Ticket Color:</p>
        <div class="color-group">
            <button class="color-btn" onclick="setChoice('#add8e6', this)" style="background:#add8e6;"></button>
            <button class="color-btn" onclick="setChoice('#90ee90', this)" style="background:#90ee90;"></button>
            <button class="color-btn" onclick="setChoice('#d3d3d3', this)" style="background:#d3d3d3;"></button>
        </div>

        <button class="primary-btn" onclick="joinGame()">JOIN ROOM</button>
    </div>

    <!-- GAME VIEW -->
    <div id="game" style="display:none;">
        <h3 id="welcome"></h3>
        <div style="background:#f0f0f0; padding:15px; border-radius:10px;">
            <small>CURRENT NUMBER</small>
            <h3 id="call" style="font-size:2rem; margin:0;">--</h3>
       </div>

        <div id="ticket" class="ticket-wrapper"></div>

        <div style="background:#f0f0f0; padding:15px; border-radius:10px;">
            <div class="history-bar">
                <small>PREVIOUS</small>
                <div class="hist-slot primary" id="hist-0">-</div>
                <div class="hist-slot secondary" id="hist-1">-</div>
                <div class="hist-slot secondary" id="hist-2">-</div>
            </div>
        </div>

        <button id="claim-btn" class="primary-btn claim-btn" onclick="claimPrize()">📢 CLAIM PRIZE!</button>
    </div>
    
    <!-- Adding a footer-->
    <div style="text-align: center; padding: 40px 0 20px 0; font-size: 10px; color: #aaa; clear: both;">
        &copy; <span id="year"></span> - All rights reserved.
    </div>

</div>

<script>
	// This will trigger the browser's default "Are you sure?" prompt on refresh/close
		window.addEventListener('beforeunload', function (e) {
			// Only show the prompt if the player has already joined the game
			// (We don't want to annoy them if they are still on the setup screen)
			if (document.getElementById('game').style.display === 'block') {
				// Cancel the event
				e.preventDefault();
				// Chrome requires returnValue to be set
				e.returnValue = '';
			}
		});
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyAk8h-RIkYCMzqVlUMloLNz7GrSRPu2rGw",
		authDomain: "tambola-52363.firebaseapp.com",
		databaseURL: "https://tambola-52363-default-rtdb.europe-west1.firebasedatabase.app",
		projectId: "tambola-52363",
		storageBucket: "tambola-52363.firebasestorage.app",
		messagingSenderId: "36956217153",
		appId: "1:36956217153:web:c7539cb599f01d88770bc0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const gameRef = db.ref('games/party1'); // Make sure this matches your Host page

    // -- When the host presses reset the players page will also reset --//
    let isResetting = false;

    gameRef.child('gameState').on('value', (snapshot) => {
        const data = snapshot.val();
        
        if (data && data.status === 'reset' && !isResetting) {
            isResetting = true; 
            
            window.onbeforeunload = null;

            // Cover the screen immediately to hide the "flicker"
            document.body.innerHTML = `
                <div style="background:black; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; display:flex; flex-direction:column; justify-content:flex-start; align-items:center; font-family:sans-serif; padding-top: 50px;">
                    <h2 style="color:#f5f2f2; margin-bottom: 20px;">Starting New Game...</h2>
                    <div class="spinner" style="border: 4px solid #f3f3f3; border-top: 4px solid #27ae60; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite;"></div>
                </div>
                <style>
                    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
                </style>
            `;

            // Wait just a bit longer to ensure the Host has switched back to 'active'
            setTimeout(() => {
                window.location.replace(window.location.pathname);
            }, 1500); // Increased to 1.5s for stability
        }
    });


    let ticketColor = '#eee';
    let lastNum = 0;

    // --- SELECTION LOGIC ---
    function setChoice(color, el) {
        ticketColor = color;
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    // --- JOIN LOGIC ---
    async function joinGame() {
        const name = document.getElementById('name').value.trim();
        if(!name) return alert("Please enter name!");

        // Duplicate Check
        const snap = await gameRef.child('players').once('value');
        const players = snap.val() || {};
        if(Object.values(players).some(p => p.name.toLowerCase() === name.toLowerCase())) {
            return alert("Name taken!");
        }

        // Save Player
        //await gameRef.child('players').push({ name: name });
		const pId = name.toLowerCase().replace(/\s+/g, '-') + "-" + Date.now();
		await gameRef.child('players').child(pId).set({ 
			name: name,
			joinedAt: Date.now()
		});

        // Switch UI
        document.getElementById('setup').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        document.getElementById('welcome').innerText = "Player: " + name;

        generateTicket();
    }

    // --- TICKET GENERATION ---
	function generateTicket() {
		const ticketDiv = document.getElementById('ticket');
		ticketDiv.innerHTML = ''; 
		ticketDiv.style.backgroundColor = ticketColor;

		let grid = Array.from({ length: 3 }, () => Array(9).fill(0));

		// 1. Distribute 5 numbers per row with clumping prevention
		for (let r = 0; r < 3; r++) {
			let count = 0;
			let attempts = 0;
			while (count < 5 && attempts < 100) {
				let idx = Math.floor(Math.random() * 9);
				
				// Check if spot is empty AND it wouldn't create 3 numbers in a row
				let createsTriple = (idx > 1 && grid[r][idx-1] !== 0 && grid[r][idx-2] !== 0) ||
									(idx < 7 && grid[r][idx+1] !== 0 && grid[r][idx+2] !== 0) ||
									(idx > 0 && idx < 8 && grid[r][idx-1] !== 0 && grid[r][idx+1] !== 0);

				if (grid[r][idx] === 0 && !createsTriple) {
					grid[r][idx] = 1;
					count++;
				}
				attempts++;
			}
		}

		// 2. Fill the columns (1-9, 10-19, etc.)
		for (let c = 0; c < 9; c++) {
			let min = c === 0 ? 1 : c * 10;
			let max = c === 8 ? 90 : (c * 10) + 9;
			
			let neededRows = [];
			for(let r=0; r<3; r++) if(grid[r][c] === 1) neededRows.push(r);
			
			let colNums = [];
			while(colNums.length < neededRows.length) {
				let num = Math.floor(Math.random() * (max - min + 1)) + min;
				if(!colNums.includes(num)) colNums.push(num);
			}
			colNums.sort((a, b) => a - b); 

			neededRows.forEach(r => {
				grid[r][c] = colNums.shift();
			});
		}

		// 3. Render grid to HTML
		grid.forEach(row => {
			row.forEach(val => {
				let cell = document.createElement('div');
				cell.className = val === 0 ? 'cell empty' : 'cell';
				cell.innerText = val === 0 ? '' : val;
				if (val !== 0) {
                    cell.onclick = () => {
                        // --- Play Sound ---
                        const sound = document.getElementById('mark-sound');
                        if (sound) {
                            sound.volume = 0.3; // Setting volume to 30 percent
                            sound.currentTime = 0; // Rewind to start so rapid clicks all play
                            sound.play().catch(() => {}); // Prevents errors if browser blocks sound
                        }

                        // --- Toggle Mark ---
                        cell.classList.toggle('marked');
                    };
                }
                

				ticketDiv.appendChild(cell);
			});
		});
	}
	

    // --- LIVE SYNC ---
    gameRef.on('value', snap => {
        const data = snap.val();
        const num = data.lastCalled || "--";
        document.getElementById('call').innerText = num;
        if (!data) return;

        // 1. Handle the "History Bar"
        if (data.allCalled) {
            const called = data.allCalled;
            
            // Get last 3 numbers, newest first
            const lastThree = [...called].slice(-4).reverse();

            // Update the slots (hist-0 is the biggest/newest)
            document.getElementById('hist-0').innerText = lastThree[1] || '-';
            document.getElementById('hist-1').innerText = lastThree[2] || '-';
            document.getElementById('hist-2').innerText = lastThree[3] || '-';
        
        
        // Show claim button if game started
        if(num !== "--") document.getElementById('claim-btn').style.display = 'block';
        }

        // 2. Your existing logic for game state (e.g., checking for game over or reset)
        if (data.gameState === 'waiting') {
            // ... show pulse animation or reload ...
        }
    });

	
	// Claim prize fuction
	function claimPrize() {
			// Get the player name from the UI
			const name = document.getElementById('welcome').innerText.replace("Hello, ", "");
			
			if(confirm("Ready to claim your prize?")) {
				// This sends the claim to Firebase
				gameRef.child('claims').push({
					playerName: name,
					time: new Date().toLocaleTimeString()
				});
				alert("Claim sent! Wait for the host to verify the numbers.");
			}
	}
	
    // Returns the Year to the footer in <Div>
    document.getElementById('year').textContent = new Date().getFullYear();
    
</script>

<audio id="mark-sound" preload="auto">
    <source src="cellclick.mp3" type="audio/mpeg">
</audio>

</body>
</html>
