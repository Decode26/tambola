<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Tambola</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; text-align: center; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        #current-number { font-size: 100px; font-weight: 800; color: #2c3e50; margin: 10px 0; line-height: 1; }
        .room-info { background: #34495e; color: white; padding: 10px; border-radius: 8px; margin-bottom: 20px; display: inline-block; }
        
        button { padding: 12px 25px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 8px; border: none; transition: 0.3s; margin: 5px; }
        .btn-draw { background: #e74c3c; color: white; }
        .btn-draw:hover { background: #c0392b; }
        .btn-join { background: #2ecc71; color: white; }
        
        /* The Board */
        .history-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin-top: 20px; }
        .num-slot { padding: 8px; border: 1px solid #ddd; border-radius: 4px; color: #ccc; font-weight: bold; }
        .num-slot.called { background: #3498db; color: white; border-color: #2980b9; transform: scale(1.05); }

        /* The Ticket */
        .ticket { display: grid; grid-template-columns: repeat(9, 1fr); gap: 8px; margin-top: 30px; background: #fff; padding: 15px; border: 3px solid #34495e; border-radius: 10px; }
        .cell { aspect-ratio: 1.2; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .cell.marked { background: #2ecc71; color: white; border-color: #27ae60; box-shadow: inset 0 0 10px rgba(0,0,0,0.1); }
        .cell.empty { background: #fdfdfd; }
    </style>
</head>
<body>

<div class="container">
    <div class="room-info">Room: <span id="room-id-display">Connecting...</span></div>
    
    <div id="game-view">
        <div id="current-number">--</div>
        <div id="host-controls" style="display:none;">
            <button class="btn-draw" onclick="drawNextNumber()">Draw Number</button>
            <button onclick="resetServerGame()">Reset Game</button>
        </div>
        
        <div class="history-grid" id="history-grid"></div>
    </div>

    <hr style="margin: 40px 0;">

    <h3>Your Personal Ticket</h3>
    <div class="ticket" id="my-ticket"></div>
</div>

<script>
    // 1. CONFIGURATION: Replace this with YOUR Firebase config!
    const firebaseConfig = {
        apiKey: "AIzaSyAk8h-RIkYCMzqVlUMloLNz7GrSRPu2rGw",
        authDomain: "tambola-52363.firebaseapp.com",
        databaseURL: "https://tambola-52363-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "tambola-52363",
        storageBucket: "tambola-52363.firebasestorage.app,
        messagingSenderId: "36956217153",
        appId: "1:36956217153:web:c7539cb599f01d88770bc0"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // For this example, we'll use a fixed room called "party1"
    const roomID = "party1"; 
    const gameRef = db.ref('games/' + roomID);

    // 2. INITIALIZE THE BOARD
    const historyGrid = document.getElementById('history-grid');
    for (let i = 1; i <= 90; i++) {
        let div = document.createElement('div');
        div.className = 'num-slot';
        div.id = `num-${i}`;
        div.innerText = i;
        historyGrid.appendChild(div);
    }

    // 3. MULTIPLAYER SYNC (The "Listener")
    gameRef.on('value', (snapshot) => {
        const data = snapshot.val() || {};
        document.getElementById('room-id-display').innerText = roomID;
        
        // Show host controls if we decided to be host (simplification: anyone can be host for now)
        document.getElementById('host-controls').style.display = 'block';

        // Update the current number
        if(data.lastCalled) {
            document.getElementById('current-number').innerText = data.lastCalled;
        } else {
            document.getElementById('current-number').innerText = "--";
        }

        // Update the board
        const calledList = data.allCalled || [];
        document.querySelectorAll('.num-slot').forEach(slot => slot.classList.remove('called'));
        calledList.forEach(num => {
            document.getElementById(`num-${num}`).classList.add('called');
        });
    });

    // 4. HOST LOGIC: Drawing Numbers
    async function drawNextNumber() {
        const snapshot = await gameRef.once('value');
        const data = snapshot.val() || {};
        const called = data.allCalled || [];

        if (called.length >= 90) return alert("All numbers called!");

        let nextNum;
        do {
            nextNum = Math.floor(Math.random() * 90) + 1;
        } while (called.includes(nextNum));

        called.push(nextNum);
        gameRef.update({
            lastCalled: nextNum,
            allCalled: called
        });
    }

    function resetServerGame() {
        if(confirm("Reset the game for EVERYONE?")) {
            gameRef.set({ lastCalled: null, allCalled: [] });
        }
    }

    // 5. LOCAL LOGIC: Generating Your Ticket
    function generateLocalTicket() {
        const ticketDiv = document.getElementById('my-ticket');
        ticketDiv.innerHTML = '';
        let nums = [];
        while(nums.length < 15) {
            let r = Math.floor(Math.random() * 90) + 1;
            if(!nums.includes(r)) nums.push(r);
        }
        nums.sort((a,b) => a-b);

        let grid = new Array(27).fill(null);
        let pos = Array.from(Array(27).keys()).sort(() => 0.5 - Math.random()).slice(0, 15);
        pos.forEach((p, i) => grid[p] = nums[i]);

        grid.forEach(n => {
            let cell = document.createElement('div');
            cell.className = n ? 'cell' : 'cell empty';
            cell.innerText = n || '';
            if(n) cell.onclick = () => cell.classList.toggle('marked');
            ticketDiv.appendChild(cell);
        });
    }

    generateLocalTicket();
</script>

</body>
</html>
